# ─────────────────────────────────────────────────────────────────────────────
# sim24 Auto Data Booker — GitHub Actions Workflow
# Runs every 30 minutes. Free, self-contained — no external service needed.
# Trigger manually anytime via the "Run workflow" button in the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────

name: sim24 Data Check & Auto-Book

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes (free, within GitHub)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  check-and-book:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # Kill if hangs (safety net)

    steps:
      # ── Checkout repository ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Install Python dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          sudo apt-get install -y libasound2t64

      # ── Run the main script ──────────────────────────────────────────────
      - name: Run data check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SIM24_USERNAME:     ${{ secrets.SIM24_USERNAME }}
          SIM24_PASSWORD:     ${{ secrets.SIM24_PASSWORD }}
          GITHUB_GIST_TOKEN:  ${{ secrets.GIST_TOKEN }}
          GITHUB_GIST_ID:     ${{ secrets.GIST_ID }}
        run: |
          python main.py
