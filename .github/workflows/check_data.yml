# ─────────────────────────────────────────────────────────────────────────────
# sim24 Auto Data Booker — GitHub Actions Workflow
# Runs every 30 minutes. Free, self-contained — no external service needed.
# Trigger manually anytime via the "Run workflow" button in the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────

name: sim24 Data Check & Auto-Book

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes (free, within GitHub)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  check-and-book:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # Kill if hangs (safety net)

    steps:
      # ── Checkout repository ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore Hugging Face cache
        id: hf-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-cache-v1

      # ── Install Python dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-download TrOCR model (if cache miss)
        if: steps.hf-cache.outputs.cache-hit != 'true'
        run: |
          python - <<'PY'
          from transformers import AutoProcessor, VisionEncoderDecoderModel
          AutoProcessor.from_pretrained("microsoft/trocr-small-printed")
          VisionEncoderDecoderModel.from_pretrained("microsoft/trocr-small-printed")
          print("TrOCR model downloaded")
          PY

      # ── Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          sudo apt-get update
          # Ubuntu 24.04 renamed libasound2 → libasound2t64.
          # playwright install-deps hard-codes libasound2, so we create a
          # dummy transitional package that satisfies the name requirement.
          sudo apt-get install -y libasound2t64 equivs --no-install-recommends
          printf 'Package: libasound2\nVersion: 1.2.99\nArchitecture: all\nDepends: libasound2t64\nMaintainer: CI <ci@ci.com>\nDescription: Transitional dummy for Ubuntu 24.04\n' \
            | equivs-build -
          sudo dpkg -i libasound2_1.2.99_all.deb
          playwright install-deps chromium

      # ── Run the main script ──────────────────────────────────────────────
      - name: Run data check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SIM24_USERNAME:     ${{ secrets.SIM24_USERNAME }}
          SIM24_PASSWORD:     ${{ secrets.SIM24_PASSWORD }}
          GITHUB_GIST_TOKEN:  ${{ secrets.GIST_TOKEN }}
          GITHUB_GIST_ID:     ${{ secrets.GIST_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py
